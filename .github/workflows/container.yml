name: Container Image
on:
  push:
    branches:
      - 'main'
    tags:        
      - '**'

jobs:
  build:
    name: Build container image and push it to registry
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      id-token: write
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Login to Amazon ECR Public
        id: login-ecr-public
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: public

      - name: Parse version
        id: get-version
        uses: battila7/get-version-action@v2
      
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push - testing - slim
        uses: docker/build-push-action@v6
        timeout-minutes: 15
        if: ${{ !steps.get-version.outputs.is-semver }}
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            cookielab/opensearch-snapshotter:${{ github.ref_name }}-slim
            public.ecr.aws/cookielab/opensearch-snapshotter:${{ github.ref_name }}-slim
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}-slim

      - name: Build and push - pre-release - slim
        uses: docker/build-push-action@v6
        timeout-minutes: 15
        if: ${{ steps.get-version.outputs.is-semver && steps.get-version.outputs.prerelease != '' }}
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            cookielab/opensearch-snapshotter:${{ steps.get-version.outputs.version-without-v }}-slim
            public.ecr.aws/cookielab/opensearch-snapshotter:${{ steps.get-version.outputs.version-without-v }}-slim
            ghcr.io/${{ github.repository }}:${{ steps.get-version.outputs.version-without-v }}-slim

      - name: Build and push - stable - slim
        uses: docker/build-push-action@v6
        timeout-minutes: 15
        if: ${{ steps.get-version.outputs.is-semver && steps.get-version.outputs.prerelease == '' }}
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            cookielab/opensearch-snapshotter:${{ steps.get-version.outputs.version-without-v }}-slim
            cookielab/opensearch-snapshotter:${{ steps.get-version.outputs.major }}.${{ steps.get-version.outputs.minor }}.${{ steps.get-version.outputs.patch }}-slim
            cookielab/opensearch-snapshotter:${{ steps.get-version.outputs.major }}.${{ steps.get-version.outputs.minor }}-slim
            cookielab/opensearch-snapshotter:${{ steps.get-version.outputs.major }}-slim
            public.ecr.aws/cookielab/opensearch-snapshotter:${{ steps.get-version.outputs.version-without-v }}-slim
            public.ecr.aws/cookielab/opensearch-snapshotter:${{ steps.get-version.outputs.major }}.${{ steps.get-version.outputs.minor }}.${{ steps.get-version.outputs.patch }}-slim
            public.ecr.aws/cookielab/opensearch-snapshotter:${{ steps.get-version.outputs.major }}.${{ steps.get-version.outputs.minor }}-slim
            public.ecr.aws/cookielab/opensearch-snapshotter:${{ steps.get-version.outputs.major }}-slim
            ghcr.io/${{ github.repository }}:${{ steps.get-version.outputs.version-without-v }}-slim
            ghcr.io/${{ github.repository }}:${{ steps.get-version.outputs.major }}.${{ steps.get-version.outputs.minor }}.${{ steps.get-version.outputs.patch }}-slim
            ghcr.io/${{ github.repository }}:${{ steps.get-version.outputs.major }}.${{ steps.get-version.outputs.minor }}-slim
            ghcr.io/${{ github.repository }}:${{ steps.get-version.outputs.major }}-slim
